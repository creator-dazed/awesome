<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>装置開発スケジュール</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="favicon.png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="titleblock">
      <div class="eyebrow">AI+IoT装置</div>
      <div id="projName" class="projname">開発プロジェクト</div>
    </div>
    <div class="controls">
      <div class="field">
        <label for="startMonth">開始月(ここから2か月)</label>
        <input type="month" id="startMonth">
      </div>
      <button class="btn primary" id="addBtn">＋ スケジュール追加</button>
      <button class="btn ghost small" id="exportBtn">バックアップ保存</button>
      <button class="btn ghost small" id="importBtn">読込</button>
      <input type="file" id="importFile" accept="application/json" style="display:none">
    </div>
  </header>

  <div class="assignee-config" id="assigneeConfig">
    <span class="ac-label">担当名(クリックで変更)</span>
  </div>

  <div class="legendbar" id="legend"></div>

  <!-- PC: 横=日付 / 縦=タスク -->
  <div class="card sched-pc">
    <div class="gantt-scroll">
      <div class="inner" id="inner"></div>
    </div>
  </div>

  <!-- スマホ: 横=担当 / 縦=週 -->
  <div class="card sched-mobile">
    <div class="m-gantt" id="mGantt"></div>
  </div>

  <div class="foot">
    <span id="rangeInfo"></span>
    <span id="syncStatus">●接続中…</span>
    <span>※約10秒ごとに自動更新</span>
    <span>バーをクリックで編集・削除できます</span>
  </div>
</div>

<!-- 追加 / 編集モーダル -->
<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <h2 id="modalTitle">スケジュール追加</h2>
    <div class="mbody">
      <div class="field">
        <label for="fName">名称</label>
        <input type="text" id="fName" placeholder="例：設計、製作、発表など" maxlength="40">
      </div>
      <div class="field">
        <label for="fAssignee">担当</label>
        <select id="fAssignee"></select>
      </div>
      <div class="two">
        <div class="field">
          <label for="fStart">開始日</label>
          <input type="date" id="fStart">
        </div>
        <div class="field">
          <label for="fEnd">終了日</label>
          <input type="date" id="fEnd">
        </div>
      </div>
      <button type="button" class="btn small daybtn" id="allDayBtn">終日(開始日と同じ)</button>
      <div class="field">
        <label for="fProg">進捗 <span class="rangeval" id="progVal">0%</span></label>
        <input type="range" id="fProg" min="0" max="100" step="5" value="0">
      </div>
      <div class="field">
        <label for="fNote">メモ(任意)</label>
        <input type="text" id="fNote" placeholder="備考など" maxlength="80">
      </div>
      <div class="hint">日付は表示範囲(2か月)の外でも登録できます。範囲外の部分は表示されません。</div>
    </div>
    <div class="mfoot">
      <button class="btn danger" id="deleteBtn" style="visibility:hidden">削除</button>
      <div class="right">
        <button class="btn ghost" id="cancelBtn">キャンセル</button>
        <button class="btn primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>
</div>

<script>
"use strict";

function defaultAssignees(){
  return [
    {id:"all", name:"全体", color:"#5B6472", editable:false},
    {id:"a1",  name:"担当1", color:"#2B4C7E", editable:true},
    {id:"a2",  name:"担当2", color:"#0E9AA7", editable:true},
    {id:"a3",  name:"担当3", color:"#C8881E", editable:true},
    {id:"a4",  name:"担当4", color:"#4C9A6E", editable:true},
  ];
}
const assigneeById = id => state.assignees.find(a=>a.id===id) || state.assignees[0];

const KEY = "devSchedule.v1";
const DAY = 86400000;

let state = {
  projName: "開発プロジェクト",
  startMonth: null,
  tasks: [],
  hidden: {},
  assignees: defaultAssignees()
};
let editingId = null;
const API = "/api/state";   // 共有データのエンドポイント
let currentRev = 0;         // サーバー側の版番号
let saveTimer = null;       // 保存のデバウンス用

function setStatus(s){
  const el = document.getElementById("syncStatus"); if(!el) return;
  if(s==="saving"){ el.textContent="●保存中…"; el.style.color="var(--c3)"; }
  else if(s==="synced"){ el.textContent="●同期済み"; el.style.color="var(--c4)"; }
  else if(s==="offline"){ el.textContent="●オフライン(端末内に保存)"; el.style.color="var(--today)"; }
}

function save(){
  // 端末内キャッシュに即時保存(オフライン保険)
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
  // サーバーへはまとめて保存(デバウンス)
  setStatus("saving");
  clearTimeout(saveTimer);
  saveTimer = setTimeout(apiSave, 600);
}
async function apiSave(){
  try{
    const res = await fetch(API, {method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(state)});
    if(!res.ok) throw new Error("save failed");
    const j = await res.json();
    if(j && typeof j.rev==="number") currentRev = j.rev;
    setStatus("synced");
  }catch(e){ setStatus("offline"); }
}

// 既定値・移行などの正規化(取得後/取り込み後に実行)
function normalizeState(){
  state.projName = "開発プロジェクト"; // 固定(編集不可)
  if(!state.startMonth){
    const n = new Date();
    state.startMonth = n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0");
  }
  if(!state.hidden) state.hidden = {};
  if(!Array.isArray(state.tasks)) state.tasks = [];
  const def = defaultAssignees();
  const savedArr = Array.isArray(state.assignees) ? state.assignees : [];
  const savedById = {}; savedArr.forEach(a=>{ if(a && a.id) savedById[a.id] = a.name; });
  state.assignees = def.map(d=>({
    id:d.id, color:d.color, editable:d.editable,
    name:(d.editable && typeof savedById[d.id]==="string" && savedById[d.id].trim()) ? savedById[d.id] : d.name
  }));
  state.tasks.forEach(t=>{
    if(t.type==="milestone"){ t.end = t.start; }
    delete t.type;
    if(t.phase && !t.assignee) t.assignee = "a1";
    if(!t.assignee || !state.assignees.some(a=>a.id===t.assignee)) t.assignee = "a1";
    delete t.phase;
    if(typeof t.progress!=="number") t.progress = 0;
    if(!t.end) t.end = t.start;
  });
  const h={}; Object.keys(state.hidden).forEach(k=>{ if(state.assignees.some(a=>a.id===k)) h[k]=state.hidden[k]; });
  state.hidden = h;
}

async function load(){
  // まず端末内キャッシュで即時表示
  try{ const raw = localStorage.getItem(KEY); if(raw){ Object.assign(state, JSON.parse(raw)); } }catch(e){}
  // 共有データ(サーバー)を取得
  let online = false;
  try{
    const res = await fetch(API);
    if(res.ok){
      const j = await res.json();
      if(j && j.data){ state = j.data; currentRev = j.rev||0; }
      online = true;
    }
  }catch(e){}
  normalizeState();
  setStatus(online ? "synced" : "offline");
}

// ---- 日付ユーティリティ ----
function rangeStartDate(){ const [y,m]=state.startMonth.split("-").map(Number); return new Date(y, m-1, 1); }
function dayCount(){ const s=rangeStartDate(); const e=new Date(s.getFullYear(), s.getMonth()+2, 1); return Math.round((e-s)/DAY); }
function fmt(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function parse(s){ return new Date(s+"T00:00:00"); }
function idxOf(dateStr){ return Math.round((parse(dateStr)-rangeStartDate())/DAY); }
function dayWidth(){ return parseInt(getComputedStyle(document.documentElement).getPropertyValue("--day-w")); }

// ---- 担当名エディタ(初期化時に一度だけ生成。renderでは作り直さない) ----
function buildAssigneeConfig(){
  const root = document.getElementById("assigneeConfig");
  root.querySelectorAll(".ac-item").forEach(n=>n.remove());
  state.assignees.forEach((a,i)=>{
    if(!a.editable) return;
    const wrap = document.createElement("label"); wrap.className="ac-item";
    wrap.innerHTML = '<span class="dot" style="background:'+a.color+'"></span>';
    const inp = document.createElement("input");
    inp.type="text"; inp.maxLength=20; inp.value=a.name; inp.setAttribute("aria-label","担当名");
    inp.addEventListener("input", ()=>{ state.assignees[i].name = inp.value; save(); render(); });
    wrap.appendChild(inp);
    root.appendChild(wrap);
  });
}

// ---- 描画 ----
function render(){
  document.getElementById("projName").textContent = state.projName;
  document.getElementById("startMonth").value = state.startMonth;
  renderLegend();
  renderGantt();
  renderMobileGantt();
  renderFoot();
}

function renderLegend(){
  const el = document.getElementById("legend");
  el.innerHTML = "";
  state.assignees.forEach(a=>{
    const off = state.hidden[a.id];
    const chip = document.createElement("div");
    chip.className = "chip " + (off ? "off" : "on") + (a.id==="all" ? " chip-all" : "");
    chip.innerHTML = '<span class="dot" style="background:'+a.color+'"></span>'+escapeHtml(a.name);
    chip.onclick = ()=>{ state.hidden[a.id] = !off; save(); render(); };
    el.appendChild(chip);
  });
}

// PC: 横=日付 / 縦=タスク
function renderGantt(){
  const inner = document.getElementById("inner");
  inner.innerHTML = "";
  const n = dayCount();
  const dw = dayWidth();
  const start = rangeStartDate();
  const todayIdx = idxOf(fmt(new Date()));

  const header = document.createElement("div"); header.className="header-row";
  const corner = document.createElement("div"); corner.className="corner"; corner.textContent="タスク / 担当";
  header.appendChild(corner);

  const headDays = document.createElement("div"); headDays.className="head-days";
  const months = [];
  for(let i=0;i<n;i++){
    const d = new Date(start.getFullYear(), start.getMonth(), 1+i);
    const key = d.getFullYear()+"-"+(d.getMonth());
    const last = months[months.length-1];
    if(!last || last.key!==key){ months.push({key, label:(d.getMonth()+1)+"月("+d.getFullYear()+")", count:1}); }
    else last.count++;
  }
  const mtrack = document.createElement("div"); mtrack.className="month-track";
  const capRow = document.createElement("div"); capRow.style.display="flex";
  months.forEach(mo=>{
    const cap = document.createElement("div"); cap.className="month-cap";
    cap.style.width = (mo.count*dw)+"px"; cap.style.minWidth=(mo.count*dw)+"px";
    cap.textContent = mo.label;
    capRow.appendChild(cap);
  });
  mtrack.appendChild(capRow);

  const dayCells = document.createElement("div"); dayCells.className="day-cells";
  const wkLabels = ["日","月","火","水","木","金","土"];
  for(let i=0;i<n;i++){
    const d = new Date(start.getFullYear(), start.getMonth(), 1+i);
    const wd = d.getDay();
    const c = document.createElement("div");
    c.className = "day-cell" + (wd===0?" weekend sun":"") + (wd===6?" weekend sat":"") + (i===todayIdx?" today":"");
    c.innerHTML = '<span class="dnum">'+d.getDate()+'</span><span>'+wkLabels[wd]+'</span>';
    dayCells.appendChild(c);
  }
  mtrack.appendChild(dayCells);
  headDays.appendChild(mtrack);
  header.appendChild(headDays);
  inner.appendChild(header);

  const visible = state.tasks
    .filter(t=>!state.hidden[t.assignee])
    .slice()
    .sort((a,b)=> (a.start<b.start?-1:a.start>b.start?1:0));

  if(visible.length===0){
    const e = document.createElement("div"); e.className="empty";
    e.innerHTML = state.tasks.length===0
      ? '<strong>まだスケジュールがありません。</strong><br>「＋ スケジュール追加」から登録してください。'
      : '<strong>表示中の担当に該当がありません。</strong><br>上の凡例で表示を有効にしてください。';
    inner.appendChild(e);
    return;
  }

  visible.forEach(t=>{
    const row = document.createElement("div"); row.className="row";
    const a = assigneeById(t.assignee);

    const label = document.createElement("div"); label.className="label";
    label.innerHTML = '<span class="lcolor" style="background:'+a.color+'"></span><span class="lname">'+escapeHtml(t.name)+'</span>';
    label.title = t.name;
    label.onclick = ()=>openModal(t.id);
    row.appendChild(label);

    const track = document.createElement("div"); track.className="track";
    track.style.width = (n*dw)+"px";

    for(let i=0;i<n;i++){
      const d = new Date(start.getFullYear(), start.getMonth(), 1+i);
      const wd = d.getDay();
      if(wd===0||wd===6){
        const wk = document.createElement("div"); wk.className="wk";
        wk.style.left=(i*dw)+"px"; wk.style.width=dw+"px"; track.appendChild(wk);
      }
      const g = document.createElement("div"); g.className="grid";
      g.style.left=(i*dw)+"px"; g.style.width=dw+"px"; track.appendChild(g);
    }
    if(todayIdx>=0 && todayIdx<n){
      const tl = document.createElement("div"); tl.className="today-line";
      tl.style.left = (todayIdx*dw + dw/2)+"px"; track.appendChild(tl);
    }

    let s = idxOf(t.start), e = idxOf(t.end);
    if(e<s) e=s;
    if(e>=0 && s<n){
      const cs = Math.max(0,s), ce = Math.min(n-1,e);
      const bar = document.createElement("div"); bar.className="bar";
      bar.style.left=(cs*dw + 2)+"px";
      bar.style.width=((ce-cs+1)*dw - 4)+"px";
      bar.style.background=a.color;
      const prog = Math.max(0,Math.min(100, t.progress||0));
      bar.innerHTML = '<span class="prog" style="width:'+prog+'%"></span><span class="blabel">'+escapeHtml(t.name)+' '+prog+'%</span>';
      bar.title = t.name+" / "+t.start+"〜"+t.end+" / 進捗"+prog+"%"+(t.note?(" / "+t.note):"");
      bar.onclick = ()=>openModal(t.id);
      track.appendChild(bar);
    }
    row.appendChild(track);
    inner.appendChild(row);
  });
}

// スマホ: 横=担当 / 縦=週(間引き)
function renderMobileGantt(){
  const root = document.getElementById("mGantt");
  root.innerHTML = "";
  let vis = state.assignees.filter(a=>!state.hidden[a.id]);
  vis = vis.filter(a=>a.id!=="all").concat(vis.filter(a=>a.id==="all")); // 全体を末尾に
  const k = vis.length;
  const n = dayCount();
  const start = rangeStartDate();
  const todayIdx = idxOf(fmt(new Date()));
  const weekH = 46;
  const weeks = Math.ceil(n/7);
  const dayPos = off => off/7*weekH; // 連続座標(日→px)

  if(k===0){
    root.innerHTML = '<div class="empty"><strong>表示する担当がありません。</strong><br>上の凡例で担当の表示を有効にしてください。</div>';
    return;
  }

  // ヘッダー(担当)
  const head = document.createElement("div"); head.className="m-head";
  head.innerHTML = '<div class="m-corner">週</div>';
  const hcols = document.createElement("div"); hcols.className="m-hcols";
  vis.forEach(a=>{
    const c = document.createElement("div"); c.className="m-hcol";
    c.innerHTML = '<span class="dot" style="background:'+a.color+'"></span><span class="nm">'+escapeHtml(a.name)+'</span>';
    hcols.appendChild(c);
  });
  head.appendChild(hcols);
  root.appendChild(head);

  const body = document.createElement("div"); body.className="m-body";

  // 週軸(縦)
  const axis = document.createElement("div"); axis.className="m-dateaxis";
  for(let w=0; w<weeks; w++){
    const ws = new Date(start.getFullYear(), start.getMonth(), 1 + w*7);
    const weDay = Math.min(w*7+6, n-1);
    const we = new Date(start.getFullYear(), start.getMonth(), 1 + weDay);
    const cell = document.createElement("div"); cell.className="m-week"; cell.style.height = weekH+"px";
    cell.innerHTML = '<span class="d">'+(ws.getMonth()+1)+"/"+ws.getDate()+'</span><span>〜'+(we.getMonth()+1)+"/"+we.getDate()+'</span>';
    axis.appendChild(cell);
  }
  body.appendChild(axis);

  // 描画エリア
  const area = document.createElement("div"); area.className="m-area"; area.style.height=(weeks*weekH)+"px";
  // 週末バンド(連続・細)
  for(let i=0;i<n;i++){
    const d = new Date(start.getFullYear(), start.getMonth(), 1+i);
    const wd = d.getDay();
    if(wd===0||wd===6){
      const b = document.createElement("div"); b.className="m-wk"; b.style.top=dayPos(i)+"px"; b.style.height=(weekH/7)+"px"; area.appendChild(b);
    }
  }
  // 週の横罫
  for(let w=1; w<weeks; w++){
    const ln = document.createElement("div"); ln.className="m-hline"; ln.style.top=(w*weekH)+"px"; area.appendChild(ln);
  }
  // 列区切り
  const colW = 100/k;
  for(let j=1;j<k;j++){
    const ln = document.createElement("div"); ln.className="m-vline"; ln.style.left=(j*colW)+"%"; area.appendChild(ln);
  }
  // 今日ライン
  if(todayIdx>=0 && todayIdx<n){
    const tl = document.createElement("div"); tl.className="m-today"; tl.style.top=dayPos(todayIdx+0.5)+"px"; area.appendChild(tl);
  }

  const tasks = state.tasks.filter(t=>!state.hidden[t.assignee] && vis.some(a=>a.id===t.assignee));
  tasks.forEach(t=>{
    let s = idxOf(t.start), e = idxOf(t.end); if(e<s) e=s;
    if(e<0 || s>=n) return;
    const cs = Math.max(0,s), ce = Math.min(n-1,e);
    const colIndex = vis.findIndex(a=>a.id===t.assignee);
    const a = assigneeById(t.assignee);
    const prog = Math.max(0,Math.min(100,t.progress||0));
    const bar = document.createElement("div"); bar.className="m-bar";
    bar.style.left = "calc("+(colIndex*colW)+"% + 3px)";
    bar.style.width = "calc("+colW+"% - 6px)";
    bar.style.top = (dayPos(cs) + 1)+"px";
    bar.style.height = Math.max(14, dayPos(ce+1) - dayPos(cs) - 2)+"px";
    bar.style.background = a.color;
    bar.title = t.name+" / "+t.start+"〜"+t.end+" / 進捗"+prog+"%"+(t.note?(" / "+t.note):"");
    bar.onclick = ()=>openModal(t.id);
    bar.innerHTML = '<span class="m-prog" style="height:'+prog+'%"></span><span class="m-blabel">'+escapeHtml(t.name)+' '+prog+'%</span>';
    area.appendChild(bar);
  });
  body.appendChild(area);
  root.appendChild(body);
}

function renderFoot(){
  const s = rangeStartDate();
  const e = new Date(s.getFullYear(), s.getMonth()+2, 0);
  document.getElementById("rangeInfo").textContent =
    "表示範囲: " + fmt(s) + " 〜 " + fmt(e) + " (" + dayCount() + "日) ｜登録 " + state.tasks.length + " 件";
}

function escapeHtml(s){ return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---- モーダル ----
function fillAssigneeSelect(){
  const sel = document.getElementById("fAssignee");
  sel.innerHTML = "";
  state.assignees.forEach(a=>{ const o=document.createElement("option"); o.value=a.id; o.textContent=a.name; sel.appendChild(o); });
}
function openModal(id){
  editingId = id || null;
  fillAssigneeSelect();
  const del = document.getElementById("deleteBtn");
  if(id){
    const t = state.tasks.find(x=>x.id===id);
    document.getElementById("modalTitle").textContent = "スケジュール編集";
    document.getElementById("fName").value = t.name;
    document.getElementById("fAssignee").value = t.assignee;
    document.getElementById("fStart").value = t.start;
    document.getElementById("fEnd").value = t.end || t.start;
    document.getElementById("fProg").value = t.progress||0;
    document.getElementById("fNote").value = t.note||"";
    del.style.visibility="visible";
  } else {
    document.getElementById("modalTitle").textContent = "スケジュール追加";
    const s = rangeStartDate();
    const def = fmt(s);
    const def2 = fmt(new Date(s.getFullYear(), s.getMonth(), s.getDate()+6));
    document.getElementById("fName").value = "";
    document.getElementById("fAssignee").value = (state.assignees.find(a=>a.editable)||state.assignees[0]).id;
    document.getElementById("fStart").value = def;
    document.getElementById("fEnd").value = def2;
    document.getElementById("fProg").value = 0;
    document.getElementById("fNote").value = "";
    del.style.visibility="hidden";
  }
  document.getElementById("progVal").textContent = document.getElementById("fProg").value+"%";
  document.getElementById("overlay").classList.add("show");
  setTimeout(()=>document.getElementById("fName").focus(),50);
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); editingId=null; }

function saveFromModal(){
  const name = document.getElementById("fName").value.trim();
  if(!name){ document.getElementById("fName").focus(); return; }
  const start = document.getElementById("fStart").value;
  if(!start){ document.getElementById("fStart").focus(); return; }
  let end = document.getElementById("fEnd").value || start;
  if(parse(end) < parse(start)) end = start;

  const data = {
    name,
    assignee: document.getElementById("fAssignee").value,
    start,
    end,
    progress: parseInt(document.getElementById("fProg").value),
    note: document.getElementById("fNote").value.trim()
  };
  if(editingId){
    Object.assign(state.tasks.find(x=>x.id===editingId), data);
  } else {
    data.id = "t"+Date.now()+Math.random().toString(36).slice(2,6);
    state.tasks.push(data);
  }
  save(); closeModal(); render();
}
function deleteCurrent(){
  if(!editingId) return;
  if(confirm("このスケジュールを削除しますか？")){
    state.tasks = state.tasks.filter(x=>x.id!==editingId);
    save(); closeModal(); render();
  }
}

// ---- バックアップ ----
function exportJson(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = (state.projName||"schedule").replace(/[\\/:*?"<>|]/g,"_") + "_backup.json";
  a.click();
  URL.revokeObjectURL(a.href);
}
function importJson(file){
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const obj = JSON.parse(r.result);
      if(!obj.tasks) throw new Error("形式が違います");
      state = Object.assign({hidden:{}}, obj);
      normalizeState();
      buildAssigneeConfig();
      save(); render();
    }catch(e){ alert("読み込みに失敗しました: " + e.message); }
  };
  r.readAsText(file);
}

// ---- イベント ----
document.getElementById("startMonth").addEventListener("change", e=>{ state.startMonth = e.target.value; save(); render(); });
document.getElementById("addBtn").addEventListener("click", ()=>openModal(null));
document.getElementById("cancelBtn").addEventListener("click", closeModal);
document.getElementById("saveBtn").addEventListener("click", saveFromModal);
document.getElementById("deleteBtn").addEventListener("click", deleteCurrent);
document.getElementById("overlay").addEventListener("click", e=>{ if(e.target.id==="overlay") closeModal(); });
document.getElementById("fProg").addEventListener("input", e=>{ document.getElementById("progVal").textContent = e.target.value+"%"; });
document.getElementById("allDayBtn").addEventListener("click", ()=>{
  const s = document.getElementById("fStart").value;
  if(s) document.getElementById("fEnd").value = s;
});
document.getElementById("exportBtn").addEventListener("click", exportJson);
document.getElementById("importBtn").addEventListener("click", ()=>document.getElementById("importFile").click());
document.getElementById("importFile").addEventListener("change", e=>{ if(e.target.files[0]) importJson(e.target.files[0]); e.target.value=""; });
document.addEventListener("keydown", e=>{ if(e.key==="Escape") closeModal(); });

// ---- 共有更新(10秒ごとに最新を取得) ----
async function pollOnce(){
  // 編集中(モーダル表示・担当名入力中)は更新しない
  const overlayOpen = document.getElementById("overlay").classList.contains("show");
  const ae = document.activeElement;
  const editingName = ae && ae.closest && ae.closest("#assigneeConfig");
  if(overlayOpen || editingName) return;
  try{
    const res = await fetch(API);
    if(!res.ok){ setStatus("offline"); return; }
    const j = await res.json();
    if(j && typeof j.rev==="number" && j.rev>currentRev && j.data){
      state = j.data; currentRev = j.rev;
      normalizeState();
      buildAssigneeConfig();
      render();
    }
    setStatus("synced");
  }catch(e){ setStatus("offline"); }
}

// ---- 初期化 ----
async function init(){
  await load();
  buildAssigneeConfig();
  render();
  setInterval(pollOnce, 10000);
}
init();
