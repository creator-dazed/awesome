<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index</title>
    <style>
        body {
            margin: 2em auto;
            max-width: 600px;
            /* 中央寄せを機能させるために追加 */
            padding: 0 20px;
        }

        p {
            color: #FF0019;
            /* fontではなくfont-sizeを指定。単位(px)も忘れずに */
            font-size: 40px;
            font-weight: bold;
            text-align: center;
        }

        /* marqueeタグの代わりとなるアニメーション（推奨） */
        .scroll-text {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-left 10s linear infinite;
        }

        @keyframes scroll-left {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }

        .container {
            overflow: hidden;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="scroll-text">Hello World!</p>
    </div>
</body>
</html>
